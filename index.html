<!-- Trage hier unten deine eigenen Firebase-Zugangsdaten ein (siehe Anleitung, Schritt 3). -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
  import {
    getFirestore, doc, setDoc, onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ==== HIER DEINE FIREBASE-KONFIGURATION EINFÜGEN (aus der Firebase-Konsole) ====
  const firebaseConfig = {
    apiKey: "AIzaSyCyLmY1kfzjbs6iXBnjQd-bkc5iQXFZcDo",
    authDomain: "jormuntosk-81dad.firebaseapp.com",
    projectId: "jormuntosk-81dad",
    storageBucket: "jormuntosk-81dad.firebasestorage.app",
    messagingSenderId: "63425046416",
    appId: "1:63425046416:web:3e4d0e77cd35b0257c3515",
    measurementId: "G-FQSJK5HZX3",
  };
  // ================================================================================

  const firebaseApp = initializeApp(firebaseConfig);
  const analytics = getAnalytics(firebaseApp);
  const db = getFirestore(firebaseApp);
  // Alle Daten landen in EINEM Dokument: Sammlung "schichtplaene", Dokument "hauptplan"
  const stateDocRef = doc(db, "schichtplaene", "hauptplan");

  // Wird vom Haupt-Skript aufgerufen, um Änderungen in die Cloud zu schreiben
  window.dbSaveState = function (payload) {
    return setDoc(stateDocRef, payload).catch((err) => {
      console.error("Firestore Speichern fehlgeschlagen:", err);
      throw err;
    });
  };

  // Wird vom Haupt-Skript aufgerufen, um laufend Änderungen aus der Cloud zu empfangen
  window.dbListenState = function (callback) {
    return onSnapshot(
      stateDocRef,
      (snap) => callback(snap.exists() ? snap.data() : null),
      (err) => console.error("Firestore Verbindung fehlgeschlagen:", err)
    );
  };

  // Signalisiert dem Haupt-Skript: Firebase ist bereit
  window.dispatchEvent(new Event("firebase-ready"));
</script>

<script>
(function(){

const DAY_NAMES_FULL = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const COLOR_CYCLE = ['#1d9e75','#d85a30','#d4537e','#639922','#e24b4a','#888780'];
const POSTEN_PALETTE = [
  {bg:'#e1f5ee', text:'#085041'},
  {bg:'#faece7', text:'#712b13'},
  {bg:'#fbeaf0', text:'#72243e'},
  {bg:'#eaf3de', text:'#27500a'},
  {bg:'#fcebeb', text:'#791f1f'},
  {bg:'#f1efe8', text:'#444441'},
  {bg:'#e6f1fb', text:'#0c447c'},
  {bg:'#faeeda', text:'#854f0b'},
  {bg:'#eeedfe', text:'#3c3489'}
];

function today(){ const d = new Date(); d.setHours(0,0,0,0); return d; }
function dateKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function fmtDate(d){ return d.toLocaleDateString('de-CH', {day:'2-digit', month:'2-digit', year:'numeric'}); }
function dayLabelFor(d){ return DAY_NAMES_FULL[d.getDay()] + ', ' + fmtDate(d); }
function shiftDurationHours(shift){
  if (!shift || !shift.time) return 0;
  const parts = shift.time.split('\u2013');
  if (parts.length !== 2) return 0;
  const [sh, sm] = parts[0].split(':').map(Number);
  const [eh, em] = parts[1].split(':').map(Number);
  if ([sh,sm,eh,em].some(n=>isNaN(n))) return 0;
  let start = sh + sm/60;
  let end = eh + em/60;
  if (end <= start) end += 24;
  return end - start;
}
function fmtHours(h){
  const rounded = Math.round(h*4)/4;
  return (rounded % 1 === 0) ? String(rounded) : rounded.toFixed(2).replace(/0+$/,'').replace(/\.$/,'');
}

let state = {
  selectedDate: today(),
  employees: [
    {id: 'e1', name: 'Anna Keller', code: 'AK4X9', competencies: ['p1'], maxShiftsPerDay: 2},
    {id: 'e2', name: 'Marco Brunner', code: 'MB7Q2', competencies: ['p2'], maxShiftsPerDay: 2},
    {id: 'e3', name: 'Sofia Weber', code: 'SW3R8', competencies: ['p1','p3'], maxShiftsPerDay: 2},
    {id: 'e4', name: 'David Meier', code: 'DM5T6', competencies: [], maxShiftsPerDay: 2},
    {id: 'e5', name: 'Lena Fischer', code: 'LF9K4', competencies: ['p3'], maxShiftsPerDay: 2},
    {id: 'e6', name: 'Thomas Huber', code: 'TH2N7', competencies: ['p2'], maxShiftsPerDay: 2}
  ],
  shiftTypes: [
    {id: 'fr', name: 'Früh', time: '06:00–14:00', color: '#378add'},
    {id: 'sp', name: 'Spät', time: '14:00–22:00', color: '#ef9f27'},
    {id: 'na', name: 'Nacht', time: '22:00–06:00', color: '#7f77dd'}
  ],
  posten: [
    {id: 'p1', name: 'Roboterzelle 1', bg: '#e1f5ee', text: '#085041'},
    {id: 'p2', name: 'Roboterzelle 2', bg: '#faece7', text: '#712b13'},
    {id: 'p3', name: 'Qualit\u00e4tskontrolle', bg: '#fbeaf0', text: '#72243e'}
  ],
  // postenAssignments[dateKey][shiftId][postenId] = employeeId or null
  postenAssignments: {},
  // unavailable[empId][dateKey] = true/false
  unavailable: {},
  // availability[empId][dateKey] = array of shiftTypeIds the employee says they could work
  availability: {},
  // wishes[empId][dateKey] = free text wish, max 100 chars
  wishes: {},
  nextShiftColorIdx: 0,
  nextPostenColorIdx: 3,
  view: 'employee', // 'admin' | 'daily' | 'employee'
  employeeViewSelectedId: null,
  adminPassword: '1234',
  adminUnlocked: false,
  adminLoginError: false,
  showPasswordModal: false,
  showCodeModal: false,
  showTshirtModal: false,
  showExportModal: false,
  exportFormat: null,
  exportPanels: { shiftPlan: true, employees: true, tshirt: false, shiftTypes: false, posten: false },
  // null = no restriction (open for all dates)
  availabilityWindowStart: null,
  availabilityWindowEnd: null,
  employeeViewLoginError: false,
  employeeViewJustRegisteredCode: null,
  selfRegisterError: null,
  collapsedPanels: {},
  employeeShiftsExpanded: false,
  confirmModal: null,
  toast: null,
  syncStatus: 'offline'
};

// ---- Cloud-Synchronisierung (Firebase Firestore) ----
// Nur diese Felder werden synchronisiert (nicht: Login-Status, aktuell offene Ansicht usw.,
// damit sich nicht ein Gerät in die Sitzung eines anderen Geräts einmischt).
const CLOUD_SYNC_KEYS = [
  'employees', 'shiftTypes', 'posten', 'postenAssignments',
  'unavailable', 'availability', 'wishes',
  'nextShiftColorIdx', 'nextPostenColorIdx',
  'adminPassword', 'availabilityWindowStart', 'availabilityWindowEnd'
];
let applyingRemoteUpdate = false;
let cloudSaveTimer = null;
let initialDateJumpApplied = false;
let cloudDataLoaded = false; // NEU: verhindert Speichern, solange die echten Cloud-Daten noch nicht geladen wurden

const SYNC_STATUS_LABELS = {
  saving: '&#8635; Speichert\u2026',
  saved: '&#10003; Gespeichert',
  error: '&#9888; Fehler beim Speichern',
  offline: '&#9679; Nicht verbunden'
};
function setSyncStatus(status){
  state.syncStatus = status;
  const el = document.getElementById('sync-status-text');
  if (!el) return;
  el.innerHTML = SYNC_STATUS_LABELS[status] || '';
  el.className = 'sync-status sync-status-'+status;
}

function scheduleCloudSave(){
  if (applyingRemoteUpdate) return;      // Änderung kam gerade aus der Cloud -> nicht zurückschreiben
  if (!cloudDataLoaded) return;          // NEU: verhindert Überschreiben, bevor die echten Cloud-Daten geladen wurden
  if (!window.dbSaveState) { setSyncStatus('offline'); return; }       // Firebase noch nicht bereit
  clearTimeout(cloudSaveTimer);
  setSyncStatus('saving');
  cloudSaveTimer = setTimeout(() => {
    const payload = {};
    CLOUD_SYNC_KEYS.forEach(k => payload[k] = state[k]);
    window.dbSaveState(payload).then(()=>setSyncStatus('saved')).catch(()=>setSyncStatus('error'));
  }, 600);
}

function restoreRememberedLogin(){
  if (state.employeeViewSelectedId) return;
  let savedId = null;
  try { savedId = localStorage.getItem('schichtplan_emp_id'); } catch(e) {}
  if (!savedId) return;
  const emp = state.employees.find(e=>e.id===savedId);
  if (emp) {
    state.employeeViewSelectedId = emp.id;
  } else {
    try { localStorage.removeItem('schichtplan_emp_id'); } catch(e) {}
  }
}
function mergeIncomingState(remote){
  cloudDataLoaded = true; // NEU: ab hier ist bekannt, ob und welche Daten in der Cloud liegen -> Speichern jetzt sicher
  if (!remote) {
    setSyncStatus('saved');
    if (!initialDateJumpApplied) {
      initialDateJumpApplied = true;
      if (state.view === 'employee' || state.view === 'daily') { state.selectedDate = getNextOpenDate(); render(); }
    }
    return;
  } // noch kein Dokument in der Cloud vorhanden, aber Verbindung steht
  applyingRemoteUpdate = true;
  CLOUD_SYNC_KEYS.forEach(k => { if (remote[k] !== undefined) state[k] = remote[k]; });
  restoreRememberedLogin();
  if (!initialDateJumpApplied) {
    initialDateJumpApplied = true;
    if (state.view === 'employee' || state.view === 'daily') { state.selectedDate = getNextOpenDate(); }
  }
  render();
  setSyncStatus('saved');
  applyingRemoteUpdate = false;
}

window.addEventListener('firebase-ready', () => {
  window.dbListenState(mergeIncomingState);
});
// -------------------------------------------------------

function ensureEntry(empId){
  if (!state.unavailable[empId]) state.unavailable[empId] = {};
  if (!state.availability[empId]) state.availability[empId] = {};
}
function toggleAvailability(empId, dKey, shiftId){
  ensureEntry(empId);
  if (!state.availability[empId][dKey]) state.availability[empId][dKey] = [];
  const list = state.availability[empId][dKey];
  const i = list.indexOf(shiftId);
  if (i >= 0) list.splice(i, 1); else list.push(shiftId);
}
function isAvailable(empId, dKey, shiftId){
  ensureEntry(empId);
  const list = state.availability[empId][dKey];
  return list && list.indexOf(shiftId) >= 0;
}
function getWish(empId, dKey){
  return (state.wishes[empId] && state.wishes[empId][dKey]) || '';
}
function setWish(empId, dKey, text){
  if (!state.wishes[empId]) state.wishes[empId] = {};
  state.wishes[empId][dKey] = (text || '').slice(0, 100);
}
function ensurePostenSlot(dKey, shiftId){
  if (!state.postenAssignments[dKey]) state.postenAssignments[dKey] = {};
  if (!state.postenAssignments[dKey][shiftId]) state.postenAssignments[dKey][shiftId] = {};
}
function getPostenAssignment(dKey, shiftId, postenId){
  ensurePostenSlot(dKey, shiftId);
  return state.postenAssignments[dKey][shiftId][postenId] || null;
}
function findOtherPostenForEmployee(dKey, shiftId, empId, excludePostenId){
  ensurePostenSlot(dKey, shiftId);
  const slots = state.postenAssignments[dKey][shiftId];
  for (const pid in slots) {
    if (pid !== excludePostenId && slots[pid] === empId) return pid;
  }
  return null;
}
function findPostenForEmployeeInShift(dKey, shiftId, empId){
  return findOtherPostenForEmployee(dKey, shiftId, empId, null);
}
function shiftsAssignedCount(empId, dKey){
  let count = 0;
  state.shiftTypes.forEach(st=>{
    if (findPostenForEmployeeInShift(dKey, st.id, empId)) count++;
  });
  return count;
}
function relativeDayLabel(d){
  const diffDays = Math.round((d - today()) / 86400000);
  if (diffDays === 0) return 'Heute';
  if (diffDays === 1) return 'Morgen';
  return null;
}
function getUpcomingShiftsForEmployee(empId){
  const todayKey = dateKey(today());
  const result = [];
  Object.keys(state.postenAssignments || {}).forEach(dKey=>{
    if (dKey < todayKey) return;
    const shiftsForDay = state.postenAssignments[dKey];
    Object.keys(shiftsForDay).forEach(shiftId=>{
      const slots = shiftsForDay[shiftId];
      Object.keys(slots).forEach(postenId=>{
        if (slots[postenId] !== empId) return;
        const st = state.shiftTypes.find(s=>s.id===shiftId);
        const p = state.posten.find(pp=>pp.id===postenId);
        result.push({
          dKey: dKey,
          date: parseDateKey(dKey),
          shiftName: st ? st.name : '?',

          postenName: p ? p.name : '?',

  result.sort((a,b)=> a.dKey < b.dKey ? -1 : (a.dKey > b.dKey ? 1 : 0));

// Startzeit einer Schicht in Minuten (für zeitliche Sortierung), null wenn nicht lesbar
function shiftStartMinutes(st){
  if (!st || !st.time) return null;
  const parts = st.time.split('\u2013');
  if (parts.length !== 2) return null;
  const nums = parts[0].split(':').map(Number);
  if (nums.length !== 2 || nums.some(n=>isNaN(n))) return null;
  return nums[0]*60 + nums[1];
}
// Prüft, ob eine (zusätzliche) Zuweisung dazu führen würde, dass der Mitarbeiter
// 3 Schichten direkt hintereinander hätte (ohne Pausen-Schicht dazwischen).
// Die Schichten werden dafür nach ihrer STARTZEIT sortiert (nicht nach Listen-Reihenfolge),
// damit später hinzugefügte Schichten korrekt eingeordnet werden.
function wouldCreateTripleRun(empId, dKey, extraShiftId){
  const ordered = state.shiftTypes.slice().sort((a,b)=>{
    const sa = shiftStartMinutes(a), sb = shiftStartMinutes(b);
    if (sa === null || sb === null) return 0; // Zeit nicht lesbar: Original-Reihenfolge behalten
    return sa - sb;
  });
  const indices = [];
  ordered.forEach((st, idx)=>{
    if (st.id === extraShiftId || findPostenForEmployeeInShift(dKey, st.id, empId)) indices.push(idx);
  });
  for (let i = 0; i + 2 < indices.length; i++){
    if (indices[i+1] === indices[i]+1 && indices[i+2] === indices[i]+2) return true;
  }
  return false;
}
function autoAssignDay(){
  const dKey = dateKey(state.selectedDate);
  let filled = 0;
  const dayCount = {};
  state.employees.forEach(emp=>{ dayCount[emp.id] = shiftsAssignedCount(emp.id, dKey); });
  state.shiftTypes.forEach(st=>{
    const usedInShift = new Set();
    state.posten.forEach(p=>{
      const existing = getPostenAssignment(dKey, st.id, p.id);
      if (existing) { usedInShift.add(existing); return; }
    });
    state.posten.forEach(p=>{
      const existing = getPostenAssignment(dKey, st.id, p.id);
      if (existing) return;
      const unavailEmp = id => state.unavailable[id] && state.unavailable[id][dKey];
      const candidate = state.employees.find(emp=>
        isQualifiedForPosten(emp, p.id) &&
        isAvailable(emp.id, dKey, st.id) &&
        !unavailEmp(emp.id) &&
        !usedInShift.has(emp.id) &&
        dayCount[emp.id] < getMaxShifts(emp) &&
        !wouldCreateTripleRun(emp.id, dKey, st.id)
      );
      if (candidate) {
        setPostenAssignment(dKey, st.id, p.id, candidate.id);
        usedInShift.add(candidate.id);
        dayCount[candidate.id]++;
        filled++;
      }
    });
  });
  render();
  if (!filled) {
    alert('Keine offenen Posten konnten automatisch besetzt werden. Stelle sicher, dass Mitarbeiter ihre Verf\u00fcgbarkeit gemeldet haben, die n\u00f6tigen Kompetenzen besitzen und ihr Tageslimit noch nicht erreicht ist.');
  } else {
    showToast(filled === 1 ? '1 Schicht automatisch zugewiesen' : filled+' Schichten automatisch zugewiesen');
  }
}

    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:12},{wch:20},{wch:22},{wch:22}];
    XLSX.utils.book_append_sheet(wb, ws, 'Schichtplan');
  }

  if (p.employees) {
    const empHeaderRow = ['Name', 'Telefon', 'Kompetenzen', 'Max. Schichten/Tag'];
    const empRows = [empHeaderRow];
    [...state.employees].sort((a,b)=>a.name.localeCompare(b.name,'de')).forEach(emp=>{
      const comps = state.posten.filter(po=>isQualifiedForPosten(emp,po.id)).map(po=>po.name).join(', ');
      empRows.push([emp.name, emp.phone || '', comps, getMaxShifts(emp)]);
    });
    const wsEmp = XLSX.utils.aoa_to_sheet(empRows);
    wsEmp['!cols'] = [{wch:22},{wch:16},{wch:30},{wch:16}];
    XLSX.utils.book_append_sheet(wb, wsEmp, 'Mitarbeiter');
  }

  if (p.tshirt) {
    const sizeCounts = getTshirtSizeCounts();
    const rows = [['Gr\u00f6\u00dfe', 'Anzahl Mitarbeiter']];
    TSHIRT_SIZES.forEach(sz=>rows.push([sz, sizeCounts[sz]]));
    const unset = state.employees.filter(e=>!e.tshirtSize).length;
    rows.push(['Ohne Angabe', unset]);
    rows.push([]);
    rows.push(['Name', 'T-Shirt-Gr\u00f6\u00dfe']);
    [...state.employees].sort((a,b)=>a.name.localeCompare(b.name,'de')).forEach(emp=>{
      rows.push([emp.name, emp.tshirtSize || '']);
    });
    const wsT = XLSX.utils.aoa_to_sheet(rows);
    wsT['!cols'] = [{wch:22},{wch:18}];
    XLSX.utils.book_append_sheet(wb, wsT, 'T-Shirt-Groessen');
  }

  if (p.shiftTypes) {
    const rows = [['Name', 'Zeit']];
    state.shiftTypes.forEach(st=>rows.push([st.name, st.time]));
    const wsS = XLSX.utils.aoa_to_sheet(rows);
    wsS['!cols'] = [{wch:22},{wch:18}];
    XLSX.utils.book_append_sheet(wb, wsS, 'Schichttypen');
  }

  if (p.posten) {
    const rows = [['Name', 'Beschreibung']];
    state.posten.forEach(po=>rows.push([po.name, po.description || '']));
    const wsP = XLSX.utils.aoa_to_sheet(rows);
    wsP['!cols'] = [{wch:22},{wch:40}];
    XLSX.utils.book_append_sheet(wb, wsP, 'Posten');
  }

  if (!wb.SheetNames.length) {
    showToast('Bitte mindestens einen Bereich ausw\u00e4hlen.', 'error');
    return;
  }
  XLSX.writeFile(wb, 'Schichtplan_'+dKey+'.xlsx');
}

function exportDailyExcel(){
  const dKey = dateKey(state.selectedDate);
  const sortedEmployees = [...state.employees].sort((a,b)=>a.name.localeCompare(b.name, 'de'));
  const headerRow = ['Mitarbeiter'].concat(state.shiftTypes.map(st=>st.name+' ('+st.time+')')).concat(['Stunden']);
  const rows = [headerRow];
  sortedEmployees.forEach(emp=>{
    const row = [emp.name];
    let totalHours = 0;
    state.shiftTypes.forEach(st=>{
      const postenId = findPostenForEmployeeInShift(dKey, st.id, emp.id);
      const posten = postenId ? state.posten.find(p=>p.id===postenId) : null;
      row.push(posten ? posten.name : '');
      if (posten) totalHours += shiftDurationHours(st);
    });
    row.push(totalHours ? fmtHours(totalHours) : '');
    rows.push(row);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:22}].concat(state.shiftTypes.map(()=>({wch:22}))).concat([{wch:10}]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Tagesuebersicht');
  XLSX.writeFile(wb, 'Tagesuebersicht_'+dKey+'.xlsx');
}

  if (state.view === 'employee') {
    html += renderEmployeeView();
  } else if (state.view === 'daily') {
    html += renderDailyView();
  } else if (!state.adminUnlocked) {
    html += renderAdminLockScreen();
  } else {
    html += renderAdminView();
  }

  if (state.showPasswordModal) {
    html += renderPasswordModal();
  }
  if (state.showCodeModal) {
    html += renderCodeChangeModal();
  }
  if (state.showTshirtModal) {
    html += renderTshirtModal();
  }
  if (state.showExportModal) {
    html += renderExportModal();
  }
  if (state.confirmModal) {
    html += renderConfirmModal();
  }
  if (state.toast) {
    html += renderToast();
  }

  app.innerHTML = html;
  wireViewSwitch();
  if (state.view === 'employee') wireEmployeeView();
  else if (state.view === 'daily') wireDailyView();
  else if (!state.adminUnlocked) wireAdminLockScreen();
  else wireAdminView();
  if (state.showPasswordModal) wirePasswordModal();
  if (state.showCodeModal) wireCodeChangeModal();
  if (state.showTshirtModal) wireTshirtModal();
  if (state.showExportModal) wireExportModal();
  if (state.confirmModal) wireConfirmModal();
  scheduleCloudSave();
}

function wireViewSwitch(){
  document.getElementById('view-admin').onclick = ()=>{ state.view='admin'; render(); };
  document.getElementById('view-daily').onclick = ()=>{ state.view='daily'; state.selectedDate = getNextOpenDate(); render(); };
  document.getElementById('view-employee').onclick = ()=>{ state.view='employee'; state.selectedDate = getNextOpenDate(); render(); };
  document.getElementById('theme-toggle').onclick = ()=>{
    const cur = document.documentElement.getAttribute('data-theme');
    document.documentElement.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
    render();
  };
}

function renderDateNav(){
  let html = '<div class="date-nav">';
  html += '<button class="day-prev" aria-label="Vorheriger Tag">&#8249;</button>';
  html += '<input type="date" class="day-picker" value="'+dateKey(state.selectedDate)+'" />';
  html += '<button class="day-next" aria-label="N&auml;chster Tag">&#8250;</button>';
  html += '</div>';
  return html;
}
function wireDateNav(){
  document.querySelectorAll('.day-prev').forEach(el=>el.onclick = ()=>shiftDay(-1));
  document.querySelectorAll('.day-next').forEach(el=>el.onclick = ()=>shiftDay(1));
  document.querySelectorAll('.day-picker').forEach(el=>el.onchange = ()=>setSelectedDateFromInput(el.value));
}

function renderEmployeeView(){
  let html = '';

  if (!state.employeeViewSelectedId) {
    html += '<div class="panel">';
    html += '<p class="panel-label">Anmelden</p>';
    html += '<p class="hint" style="margin:0 0 12px;">Gib deinen Namen und deinen pers&ouml;nlichen Code ein.</p>';
    html += '<div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">';
    html += '<input id="emp-login-name" type="text" placeholder="Dein Name" style="width:180px;" />';
    html += '<input id="emp-login-code" type="text" placeholder="Code" style="width:120px; text-transform:uppercase;" />';
    html += '<button id="emp-login-btn">Anmelden</button>';
    html += '</div>';
    if (state.employeeViewLoginError) {
      html += '<p style="color:#b3261e; font-size:12px; margin-top:8px;">Name oder Code stimmen nicht. Bitte beim Planer nachfragen.</p>';
    }
    html += '</div>';

    html += '<div class="panel">';
    html += '<p class="panel-label">Noch kein Zugang?</p>';
    html += '<div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">';
    html += '<input id="new-self-emp-name" type="text" placeholder="Dein Name" style="width:160px;" />';
    html += '<input id="new-self-emp-phone" type="tel" placeholder="Telefonnummer *" style="width:160px;" />';
    html += '<button id="add-self-emp">+ Neu erfassen</button>';
    html += '</div>';
    if (state.selfRegisterError) {
      html += '<p style="color:#b3261e; font-size:12px; margin-top:8px;">'+state.selfRegisterError+'</p>';
    }
    html += '<p class="hint" style="margin-top:8px;">Telefonnummer ist erforderlich. </p>';
    html += '</div>';
    return html;
  }

  const empId = state.employeeViewSelectedId;
  const emp = state.employees.find(e=>e.id===empId);
  ensureEntry(empId);
  const dKey = dateKey(state.selectedDate);

  if (state.employeeViewJustRegisteredCode) {
    html += '<div class="panel" style="border-color:var(--border-strong);">';
    html += '<p class="panel-label">Willkommen, '+emp.name+'</p>';
    html += '<p style="font-size:13px; margin:0 0 6px;">Dein pers&ouml;nlicher Code lautet:</p>';
    html += '<p style="font-size:22px; font-weight:600; letter-spacing:2px; margin:0 0 6px;">'+state.employeeViewJustRegisteredCode+'</p>';
    html += '<p class="hint" style="margin:0;">Merke dir Name und Code gut &ndash; damit meldest du dich k&uuml;nftig an.</p>';
    html += '</div>';
  }

  html += '<div class="panel">';
  html += '<div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;">';
  html += '<p class="panel-label" style="margin:0;">Angemeldet als '+emp.name+'</p>';
  html += '<div style="display:flex; gap:8px; flex-wrap:wrap;">';
  html += '<button id="emp-open-code-modal-btn">Code &auml;ndern</button>';
  html += '<button id="emp-open-tshirt-modal-btn">T-Shirt-Gr&ouml;&szlig;e'+(emp.tshirtSize ? ' ('+emp.tshirtSize+')' : '')+'</button>';
  html += '<button id="emp-logout-btn">Abmelden</button>';
  html += '</div>';
  html += '</div>';
  html += '<label style="display:flex; align-items:center; gap:8px; font-size:13px; margin-top:10px;">Wie viele Schichten kannst/willst du maximal pro Tag arbeiten? ';
  html += '<input type="number" min="1" max="'+state.shiftTypes.length+'" value="'+getMaxShifts(emp)+'" id="self-max-shifts" style="width:60px; text-align:center;" />';
  html += '</label>';
  html += '</div>';

  const upcomingShifts = getUpcomingShiftsForEmployee(empId);
  const SHIFTS_PREVIEW_COUNT = 8;
  const expanded = state.employeeShiftsExpanded;
  const visibleShifts = expanded ? upcomingShifts : upcomingShifts.slice(0, SHIFTS_PREVIEW_COUNT);
  html += '<div class="panel">';
  html += '<p class="panel-label">Meine kommenden Schichten</p>';
  if (!upcomingShifts.length) {
    html += '<p class="hint" style="margin:0;">Du bist aktuell f\u00fcr keine kommende Schicht eingeteilt.</p>';
  } else {
    html += '<div style="display:flex; flex-direction:column; gap:6px;">';
    visibleShifts.forEach(s=>{
      const rel = relativeDayLabel(s.date);
      const dayText = (rel ? rel+' \u00b7 ' : '') + dayLabelFor(s.date);
      html += '<div style="display:flex; align-items:center; justify-content:space-between; gap:10px; padding:8px 10px; border:1px solid var(--border-strong); border-radius:8px;">';
      html += '<div>';
      html += '<div style="font-weight:600; font-size:13px;">'+dayText+'</div>';
      html += '<div style="font-size:12px; color:var(--text-muted);">'+s.shiftName+' \u00b7 '+s.shiftTime+'</div>';
      html += '</div>';
      html += '<span style="background:'+s.postenBg+'; color:'+s.postenText+'; padding:4px 10px; border-radius:6px; font-weight:600; font-size:12px; white-space:nowrap;">'+s.postenName+'</span>';
      html += '</div>';
    });
    html += '</div>';
    if (upcomingShifts.length > SHIFTS_PREVIEW_COUNT) {
      html += '<button id="toggle-my-shifts" style="margin-top:10px;">'+(expanded ? 'Weniger anzeigen' : 'Alle '+upcomingShifts.length+' anzeigen')+'</button>';
    }
  }
  html += '</div>';

  html += '<div class="toolbar">';
  html += renderDateNav();
  html += '</div>';
  html += '<p style="font-weight:600; font-size:15px; margin:0 0 4px;">'+dayLabelFor(state.selectedDate)+'</p>';

  if (!isDateOpenForEmployeeInput(state.selectedDate)) {
    let rangeMsg = 'Die Eingabe ist f\u00fcr dieses Datum nicht freigegeben.';
    if (state.availabilityWindowStart || state.availabilityWindowEnd) {
      const s = state.availabilityWindowStart ? fmtDate(parseDateKey(state.availabilityWindowStart)) : 'offen';
      const e = state.availabilityWindowEnd ? fmtDate(parseDateKey(state.availabilityWindowEnd)) : 'offen';
      rangeMsg += ' Freigegeben ist der Zeitraum '+s+' bis '+e+'.';
    }
    html += '<p class="hint" style="margin:0 0 12px;">'+rangeMsg+'</p>';
    return html;
  }

  html += '<p style="font-size:13px; color:#6b6a63; margin:0 0 12px;">Markiere, welche Schichten an diesem Tag f&uuml;r dich gehen w&uuml;rden, oder w&auml;hle "Nicht m&ouml;glich", falls du an diesem Tag generell nicht kannst.</p>';

  const isUnavail = !!(state.unavailable[empId] && state.unavailable[empId][dKey]);

  html += '<label class="emp-shift-option'+(isUnavail?' unavail-active':'')+'" style="margin-bottom:10px;">';
  html += '<input type="checkbox" id="self-unavailable-toggle"'+(isUnavail?' checked':'')+' />';
  html += '<span style="font-weight:600;">Nicht m&ouml;glich</span>';
  html += '<span class="emp-shift-time">ich kann an diesem Tag nicht arbeiten</span>';
  html += '</label>';

  state.shiftTypes.forEach(st=>{
    const checked = isAvailable(empId, dKey, st.id);
    const checkedStyle = checked ? ' style="background:color-mix(in srgb, '+st.color+' 18%, var(--surface)); color:'+st.color+'; border-color:'+st.color+';"' : '';
    html += '<label class="emp-shift-option'+(isUnavail?' emp-shift-disabled':'')+'"'+checkedStyle+'>';
    html += '<input type="checkbox" data-avail-emp="'+empId+'" data-avail-shift="'+st.id+'"'+(checked?' checked':'')+(isUnavail?' disabled':'')+' />';
    html += '<span>'+st.name+'</span><span class="emp-shift-time">'+st.time+'</span>';
    html += '</label>';
  });

  const wish = getWish(empId, dKey);
  html += '<div class="panel" style="margin-top:14px;">';

      const posten = postenId ? state.posten.find(p=>p.id===postenId) : null;
      html += '<td style="padding:6px;">';

      } else {
        html += '<div style="padding:8px 4px; color:#d6d3c9;">&middot;</div>';
      }
      html += '</td>';
    });
    html += '<td style="padding:6px; font-weight:600;">'+(totalHours ? fmtHours(totalHours)+' h' : '\u2013')+'</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  const hasDescriptions = state.posten.some(p=>(p.description||'').trim());
  if (hasDescriptions) {
    html += '<div style="margin-top:16px; border-top:1px solid #eeece4; padding-top:12px;">';
    html += '<p style="font-weight:600; font-size:13px; margin:0 0 8px;">Legende &ndash; Aufgaben pro Posten</p>';
    html += '<div style="display:flex; flex-direction:column; gap:6px;">';
    state.posten.forEach(p=>{
      const desc = (p.description||'').trim();
      if (!desc) return;
      html += '<div style="display:flex; align-items:flex-start; gap:8px; font-size:12px; color:#4a4943;">';
      html += '<span class="chip-dot" style="margin-top:3px; flex-shrink:0; background:'+(p.bg||'#f1efe8')+'; border:1px solid '+(p.text||'#444441')+';"></span>';
      html += '<span><strong>'+p.name+':</strong> '+desc.replace(/</g,'&lt;')+'</span>';
      html += '</div>';
    });
    html += '</div></div>';
  } else {
    html += '<div style="display:flex; gap:14px; flex-wrap:wrap; margin-top:14px;">';
    state.posten.forEach(p=>{
      html += '<div style="display:flex; align-items:center; gap:6px; font-size:12px; color:#6b6a63;">';
      html += '<span class="chip-dot" style="background:'+(p.bg||'#f1efe8')+'; border:1px solid '+(p.text||'#444441')+';"></span>'+p.name;
      html += '</div>';
    });
    html += '</div>';
  }

  return html;
}

  html += '<p class="hint" style="margin:0 0 12px;">Markiere pro Mitarbeiter, f&uuml;r welche Posten er qualifiziert ist. Nur qualifizierte Mitarbeiter sind sp&auml;ter bei diesem Posten ausw&auml;hlbar.</p>';
  (function(){
    const sizeCounts = getTshirtSizeCounts();
    const unsetCount = state.employees.filter(e=>!e.tshirtSize).length;
    html += '<div style="margin-bottom:14px;">';
    html += '<p style="font-size:12px; color:var(--text-muted); margin:0 0 6px;">T-Shirt-Gr&ouml;&szlig;en im Team</p>';
    html += '<div style="display:flex; flex-wrap:wrap; gap:8px;">';
    TSHIRT_SIZES.forEach(sz=>{
      html += '<span class="chip" style="gap:6px; padding:5px 10px;"><strong>'+sz+'</strong><span style="color:var(--text-muted);">'+sizeCounts[sz]+'</span></span>';
    });
    if (unsetCount) {
      html += '<span class="chip" style="gap:6px; padding:5px 10px; opacity:0.7;">Ohne Angabe<span style="color:var(--text-muted);">'+unsetCount+'</span></span>';
    }
    html += '</div></div>';
  })();
  html += '<div style="display:flex; flex-direction:column; gap:10px; margin-bottom:12px;">';
  [...state.employees].sort((a,b)=>a.name.localeCompare(b.name,'de')).forEach(emp=>{
    html += '<div class="emp-card">';
    html += '<div style="display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; flex-wrap:wrap;">';
    html += '<span style="font-weight:600;">'+emp.name+(emp.phone ? ' <a href="tel:'+emp.phone.replace(/\s+/g,'')+'" target="_top" style="color:var(--text-muted); text-decoration:none; font-weight:400; font-size:12px;" title="'+emp.phone+' anrufen">&#128222;</a>' : '')+'</span>';
    html += '<div style="display:flex; align-items:center; gap:14px; flex-wrap:wrap;">';
    html += '<span style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted);">Code <input type="text" value="'+(emp.code||'')+'" data-code-emp="'+emp.id+'" maxlength="8" style="width:80px; height:28px; padding:4px 6px; font-family:monospace; font-size:13px; letter-spacing:1px; text-transform:uppercase;" /> <button data-regen-code-emp="'+emp.id+'" title="Zuf&auml;lligen Code generieren" style="padding:4px 8px; font-size:11px;">&#8635;</button></span>';
    html += '<label style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted);">Telefon <input type="tel" value="'+(emp.phone||'')+'" placeholder="Telefonnummer" data-phone-emp="'+emp.id+'" style="width:140px; height:30px; padding:4px 8px;" /></label>';
    html += '<label style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted);">Max. Schichten/Tag <input type="number" min="1" max="'+state.shiftTypes.length+'" value="'+getMaxShifts(emp)+'" data-max-shifts-emp="'+emp.id+'" style="width:54px; height:30px; padding:4px 6px; text-align:center;" /></label>';
    html += '<label style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted);">T-Shirt <select data-tshirt-emp="'+emp.id+'" style="height:30px; padding:2px 6px;">';
    html += '<option value=""'+(!emp.tshirtSize ? ' selected' : '')+'>&ndash;</option>';
    TSHIRT_SIZES.forEach(sz=>{
      html += '<option value="'+sz+'"'+(emp.tshirtSize===sz ? ' selected' : '')+'>'+sz+'</option>';
    });
    html += '</select></label>';
    html += '<button data-clear-assign-emp="'+emp.id+'" title="Alle Schicht-Zuweisungen dieses Mitarbeiters l&ouml;schen" style="padding:4px 10px; font-size:11px;">Zuweisungen l&ouml;schen</button>';
    html += '<button class="chip-remove" data-remove-emp="'+emp.id+'" aria-label="Mitarbeiter entfernen">&times;</button>';
    html += '</div></div>';
    if (state.posten.length) {
      html += '<div style="display:flex; flex-wrap:wrap; gap:6px;">';
      state.posten.forEach(p=>{
        const active = isQualifiedForPosten(emp, p.id);
        html += '<button class="comp-tag'+(active?' comp-tag-active':'')+'" data-toggle-comp-emp="'+emp.id+'" data-toggle-comp-id="'+p.id+'">'+(active?'\u2713 ':'')+p.name+'</button>';
      });
      html += '</div>';
    } else {
      html += '<p class="hint" style="margin:0;">Lege oben Posten an, um Kompetenzen zuzuweisen.</p>';
    }
    if (state.shiftTypes.length) {
      const isUnavailToday = !!(state.unavailable[emp.id] && state.unavailable[emp.id][dKey]);
      html += '<div style="margin-top:8px; display:flex; align-items:center; gap:6px; flex-wrap:wrap;">';
      html += '<span style="font-size:12px; color:var(--text-muted);">Verf&uuml;gbar am '+fmtDate(state.selectedDate)+':</span>';
      if (isUnavailToday) {
        html += '<span class="hint" style="margin:0;">Als nicht verf&uuml;gbar gemeldet</span>';
      } else {
        const availableShifts = state.shiftTypes.filter(st=>isAvailable(emp.id, dKey, st.id));
        if (availableShifts.length) {
          availableShifts.forEach(st=>{
            html += '<span class="chip-dot" style="display:inline-block; width:8px; height:8px; border-radius:50%; background:'+st.color+';"></span>';
            html += '<span style="font-size:12px; margin-right:8px;">'+st.name+'</span>';
          });
        } else {
          html += '<span class="hint" style="margin:0;">Keine Verf&uuml;gbarkeit gemeldet</span>';
        }
      }
      html += '</div>';
    }
    const cardWish = getWish(emp.id, dKey);
    if (cardWish) {
      html += '<p style="font-size:12px; margin:8px 0 0; color:var(--text-muted);"><strong style="color:var(--text);">Wunsch f&uuml;r '+fmtDate(state.selectedDate)+':</strong> '+cardWish+'</p>';
    }
    html += '</div>';
  });
  html += '</div>';
  html += '<div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">';
  html += '<input id="new-emp-name" type="text" placeholder="Name des Mitarbeiters" style="width:200px;" />';
  html += '<input id="new-emp-phone" type="tel" placeholder="Telefonnummer" style="width:160px;" />';
  html += '<button id="add-emp">+ Mitarbeiter hinzufügen</button>';
  html += '</div>';
  }
  html += '</div>';

  html += '<p style="font-weight:600; font-size:15px; margin:0 0 14px;">'+dayLabelFor(state.selectedDate)+'</p>';

  if (!state.posten.length) {
    html += '<p style="color:#6b6a63; font-size:14px;">Lege zuerst oben mindestens einen Posten an.</p>';
    return html;
  }

  html += '<div class="'+(state.exportPanels.shiftPlan ? '' : 'print-hide')+'">';
  state.shiftTypes.forEach(st=>{
    const panelKey = 'shift:'+st.id;
    // Schicht-Karten sind standardmäßig EINgeklappt (wie die Panels oben)
    const shiftCollapsed = isPanelCollapsed(panelKey);
    const unfilledCount = state.posten.filter(p=>{
      const aId = getPostenAssignment(dKey, st.id, p.id);
      if (!aId) return true;
      const aEmp = state.employees.find(e=>e.id===aId);
      return !aEmp || !isQualifiedForPosten(aEmp, p.id);
    }).length;
    html += '<div class="shift-card">';
    html += '<div class="shift-card-head" data-toggle-panel="'+panelKey+'" style="cursor:pointer; margin-bottom:'+(shiftCollapsed?'0':'8px')+';">';
    html += '<span class="chip-dot" style="background:'+st.color+';"></span>';
    html += '<span style="font-weight:600; font-size:14px;">'+st.name+'</span>';
    html += '<span style="font-size:12px; color:#6b6a63;">'+st.time+'</span>';
    if (shiftCollapsed) {
      if (unfilledCount > 0) {
        html += '<span class="posten-warning-badge" style="margin-left:auto;">&#9888; '+unfilledCount+' von '+state.posten.length+' Posten unbesetzt</span>';
      } else {
        html += '<span style="margin-left:auto; color:var(--active-bg); font-size:11px; font-weight:600; white-space:nowrap;">&#10003; komplett besetzt</span>';
      }
    } else {
      html += '<span style="margin-left:auto;"></span>';
    }
    html += '<span class="panel-arrow" style="margin-left:8px;">'+(shiftCollapsed?'\u25b8':'\u25be')+'</span>';
    html += '</div>';
    if (!shiftCollapsed) {
    state.posten.forEach(p=>{
      let assignedId = getPostenAssignment(dKey, st.id, p.id);
      const qualifiedEmployees = state.employees.filter(emp=>isQualifiedForPosten(emp, p.id));
      if (assignedId && !qualifiedEmployees.find(e=>e.id===assignedId)) {
        setPostenAssignment(dKey, st.id, p.id, null);
        assignedId = null;
      }
      const selectableEmployees = qualifiedEmployees.filter(emp=>{
        const isUnavail = state.unavailable[emp.id] && state.unavailable[emp.id][dKey];
        if (isUnavail && emp.id !== assignedId) return false;
        return emp.id === assignedId || shiftsAssignedCount(emp.id, dKey) < getMaxShifts(emp);
      });
      html += '<div class="posten-row'+(assignedId?'':' posten-row-unfilled')+'">';
      html += '<span class="posten-name">'+p.name+'</span>';
      html += '<select data-assign-shift="'+st.id+'" data-assign-posten="'+p.id+'">';
      html += '<option value="">- nicht besetzt -</option>';
      selectableEmployees.forEach(emp=>{
        const ok = isAvailable(emp.id, dKey, st.id);
        const sel = assignedId === emp.id ? ' selected' : '';
        const otherPosten = findOtherPostenForEmployee(dKey, st.id, emp.id, p.id);
        const otherPostenName = otherPosten ? (state.posten.find(x=>x.id===otherPosten)||{}).name : null;
        let label = (ok ? '\u2713 ' : '') + emp.name;
        if (otherPostenName) label += ' \u2014 bereits: ' + otherPostenName;
        html += '<option value="'+emp.id+'"'+sel+'>'+label+'</option>';
      });
      html += '</select>';
      if (!assignedId) {
        html += '<span class="posten-warning-badge">&#9888; unbesetzt</span>';
      }
      if (!selectableEmployees.length) {
        const msg = qualifiedEmployees.length
          ? 'Niemand verf\u00fcgbar oder alle haben ihr Tageslimit erreicht.'
          : 'Niemand qualifiziert \u2013 weise dies im Mitarbeiter-Panel oben zu.';
        html += '<span class="hint" style="margin-left:8px;">'+msg+'</span>';
      }
      html += '</div>';
    });
    }
    html += '</div>';
  });

  html += '<p class="hint" style="margin-top:8px;">'+state.employees.length+' Mitarbeiter · &#10003; markiert vom Mitarbeiter gemeldete Verf&uuml;gbarkeit f&uuml;r dieses Datum</p>';
  html += '</div>';

  if (state.exportPanels.employees) {
  html += '<div class="print-only" style="margin-top:24px;">';
  html += '<p style="font-weight:600; font-size:15px; margin:0 0 10px;">Mitarbeiter&uuml;bersicht</p>';
  html += '<table style="width:100%; border-collapse:collapse; font-size:12px;">';
  html += '<thead><tr>';
  ['Name','Telefon','Kompetenzen','Max. Schichten/Tag'].forEach(h=>{
    html += '<th style="text-align:left; border-bottom:1px solid #d6d3c9; padding:6px 8px;">'+h+'</th>';
  });
  html += '</tr></thead><tbody>';
  [...state.employees].sort((a,b)=>a.name.localeCompare(b.name,'de')).forEach(emp=>{
    const comps = state.posten.filter(p=>isQualifiedForPosten(emp,p.id)).map(p=>p.name).join(', ');
    html += '<tr>';
    html += '<td style="padding:6px 8px; border-bottom:1px solid #eeece4;">'+emp.name+'</td>';
    html += '<td style="padding:6px 8px; border-bottom:1px solid #eeece4;">'+(emp.phone? '<a href="tel:'+emp.phone.replace(/\s+/g,'')+'" target="_top" style="color:inherit; text-decoration:underline;">'+emp.phone+'</a>' : '\u2013')+'</td>';
    html += '<td style="padding:6px 8px; border-bottom:1px solid #eeece4;">'+(comps||'\u2013')+'</td>';
    html += '<td style="padding:6px 8px; border-bottom:1px solid #eeece4;">'+getMaxShifts(emp)+'</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  html += '</div>';
  }

  if (state.exportPanels.tshirt) {
    const sizeCounts = getTshirtSizeCounts();
    const unsetCount = state.employees.filter(e=>!e.tshirtSize).length;
    html += '<div class="print-only" style="margin-top:24px;">';
    html += '<p style="font-weight:600; font-size:15px; margin:0 0 10px;">T-Shirt-Gr&ouml;&szlig;en</p>';
    html += '<table style="width:100%; border-collapse:collapse; font-size:12px;">';
    html += '<thead><tr><th style="text-align:left; border-bottom:1px solid #d6d3c9; padding:6px 8px;">Gr&ouml;&szlig;e</th><th style="text-align:left; border-bottom:1px solid #d6d3c9; padding:6px 8px;">Anzahl</th></tr></thead><tbody>';
    TSHIRT_SIZES.forEach(sz=>{
      html += '<tr><td style="padding:6px 8px; border-bottom:1px solid #eeece4;">'+sz+'</td><td style="padding:6px 8px; border-bottom:1px solid #eeece4;">'+sizeCounts[sz]+'</td></tr>';
    });
    if (unsetCount) {
      html += '<tr><td style="padding:6px 8px;">Ohne Angabe</td><td style="padding:6px 8px;">'+unsetCount+'</td></tr>';
    }
    html += '</tbody></table>';
    html += '</div>';
  }

  if (state.exportPanels.shiftTypes) {
    html += '<div class="print-only" style="margin-top:24px;">';
    html += '<p style="font-weight:600; font-size:15px; margin:0 0 10px;">Schichttypen</p>';
    html += '<table style="width:100%; border-collapse:collapse; font-size:12px;">';
    html += '<thead><tr><th style="text-align:left; border-bottom:1px solid #d6d3c9; padding:6px 8px;">Name</th><th style="text-align:left; border-bottom:1px solid #d6d3c9; padding:6px 8px;">Zeit</th></tr></thead><tbody>';
    state.shiftTypes.forEach(st=>{
      html += '<tr><td style="padding:6px 8px; border-bottom:1px solid #eeece4;">'+st.name+'</td><td style="padding:6px 8px; border-bottom:1px solid #eeece4;">'+st.time+'</td></tr>';
    });
    html += '</tbody></table>';
    html += '</div>';
  }

  if (state.exportPanels.posten) {
    html += '<div class="print-only" style="margin-top:24px;">';
    html += '<p style="font-weight:600; font-size:15px; margin:0 0 10px;">Posten</p>';
    html += '<table style="width:100%; border-collapse:collapse; font-size:12px;">';
    html += '<thead><tr><th style="text-align:left; border-bottom:1px solid #d6d3c9; padding:6px 8px;">Name</th><th style="text-align:left; border-bottom:1px solid #d6d3c9; padding:6px 8px;">Beschreibung</th></tr></thead><tbody>';
    state.posten.forEach(po=>{
      html += '<tr><td style="padding:6px 8px; border-bottom:1px solid #eeece4;">'+po.name+'</td><td style="padding:6px 8px; border-bottom:1px solid #eeece4;">'+(po.description||'\u2013')+'</td></tr>';
    });
    html += '</tbody></table>';
    html += '</div>';
  }

  return html;
}

function wireAdminView(){
  const app = document.getElementById('app');
  wireDateNav();
  const autoAssignBtn = document.getElementById('auto-assign');
  if (autoAssignBtn) autoAssignBtn.onclick = autoAssignDay;
  const clearDayBtn = document.getElementById('clear-day-assign');
  if (clearDayBtn) clearDayBtn.onclick = clearDayAssignments;
  const exportExcelBtn = document.getElementById('export-excel');
  const exportPdfBtn = document.getElementById('export-pdf');
  if (exportExcelBtn) exportExcelBtn.onclick = ()=>{ state.exportFormat = 'excel'; state.showExportModal = true; render(); };
  if (exportPdfBtn) exportPdfBtn.onclick = ()=>{ state.exportFormat = 'pdf'; state.showExportModal = true; render(); };
  const lockBtn = document.getElementById('lock-admin');
  if (lockBtn) lockBtn.onclick = lockAdmin;
  const openPwBtn = document.getElementById('open-pw-modal');
  if (openPwBtn) openPwBtn.onclick = ()=>{ state.showPasswordModal = true; render(); };
  const saveAvailBtn = document.getElementById('save-avail-window');
  if (saveAvailBtn) saveAvailBtn.onclick = ()=>{
    const startEl = document.getElementById('avail-window-start');
    const endEl = document.getElementById('avail-window-end');
    setAvailabilityWindow(startEl.value, endEl.value);
    render();
  };
  const clearAvailBtn = document.getElementById('clear-avail-window');
  if (clearAvailBtn) clearAvailBtn.onclick = clearAvailabilityWindow;
  const addShiftBtn = document.getElementById('add-shift-type');
  if (addShiftBtn) addShiftBtn.onclick = addShiftType;
  const addPostenBtn = document.getElementById('add-posten');
  if (addPostenBtn) addPostenBtn.onclick = addPosten;

  app.querySelectorAll('[data-toggle-panel]').forEach(el=>{
    el.onclick = ()=>togglePanel(el.getAttribute('data-toggle-panel'));
  });

  const addEmpBtn = document.getElementById('add-emp');
  if (addEmpBtn) addEmpBtn.onclick = addEmployee;
  const empNameInput = document.getElementById('new-emp-name');
  if (empNameInput) empNameInput.onkeydown = (e)=>{ if(e.key==='Enter') addEmployee(); };
  const empPhoneInput = document.getElementById('new-emp-phone');
  if (empPhoneInput) empPhoneInput.onkeydown = (e)=>{ if(e.key==='Enter') addEmployee(); };
  const postenInput = document.getElementById('new-posten-name');
  if (postenInput) postenInput.onkeydown = (e)=>{ if(e.key==='Enter') addPosten(); };

  app.querySelectorAll('[data-remove-emp]').forEach(el=>{
    el.onclick = ()=>removeEmployee(el.getAttribute('data-remove-emp'));
  });
  app.querySelectorAll('[data-clear-assign-emp]').forEach(el=>{
    el.onclick = ()=>clearEmployeeAssignments(el.getAttribute('data-clear-assign-emp'));
  });
  app.querySelectorAll('[data-max-shifts-emp]').forEach(el=>{
    el.onchange = ()=>{ setMaxShifts(el.getAttribute('data-max-shifts-emp'), el.value); render(); };
  });
  app.querySelectorAll('[data-tshirt-emp]').forEach(el=>{
    el.onchange = ()=>setEmployeeTshirtSize(el.getAttribute('data-tshirt-emp'), el.value);
  });
  app.querySelectorAll('[data-phone-emp]').forEach(el=>{
    el.onchange = ()=>{ setEmployeePhone(el.getAttribute('data-phone-emp'), el.value); };
  });
  app.querySelectorAll('[data-code-emp]').forEach(el=>{
    el.onchange = ()=>setEmployeeCode(el.getAttribute('data-code-emp'), el.value);
  });
  app.querySelectorAll('[data-regen-code-emp]').forEach(el=>{
    el.onclick = ()=>regenerateEmployeeCode(el.getAttribute('data-regen-code-emp'));
  });
  app.querySelectorAll('[data-remove-shift]').forEach(el=>{
    el.onclick = ()=>removeShiftType(el.getAttribute('data-remove-shift'));
  });
  app.querySelectorAll('[data-remove-posten]').forEach(el=>{
    el.onclick = ()=>removePosten(el.getAttribute('data-remove-posten'));
  });
  app.querySelectorAll('[data-shift-color]').forEach(el=>{
    el.onchange = ()=>setShiftColor(el.getAttribute('data-shift-color'), el.value);
  });
  app.querySelectorAll('[data-posten-color-bg]').forEach(el=>{
    el.onchange = ()=>setPostenColor(el.getAttribute('data-posten-color-bg'), 'bg', el.value);
  });
  app.querySelectorAll('[data-posten-color-text]').forEach(el=>{
    el.onchange = ()=>setPostenColor(el.getAttribute('data-posten-color-text'), 'text', el.value);
  });
  app.querySelectorAll('[data-posten-desc]').forEach(el=>{
    el.onchange = ()=>setPostenDescription(el.getAttribute('data-posten-desc'), el.value);
  });
  app.querySelectorAll('[data-toggle-comp-emp]').forEach(el=>{
    el.onclick = ()=>toggleEmployeeCompetency(el.getAttribute('data-toggle-comp-emp'), el.getAttribute('data-toggle-comp-id'));
  });
  const dKey = dateKey(state.selectedDate);
  app.querySelectorAll('[data-assign-shift]').forEach(el=>{
    el.onchange = ()=>{
      const shiftId = el.getAttribute('data-assign-shift');
      const postenId = el.getAttribute('data-assign-posten');
      const newEmpId = el.value || null;
      const applyAssignment = ()=>{
        setPostenAssignment(dKey, shiftId, postenId, newEmpId);
        render();
      };
      if (newEmpId) {
        const emp = state.employees.find(e=>e.id===newEmpId);
        if (emp) {
          const warnings = [];
          if (!isAvailable(emp.id, dKey, shiftId)) warnings.push('hat diese Schicht nicht als verf\u00fcgbar gemeldet');
          if (wouldCreateTripleRun(emp.id, dKey, shiftId)) warnings.push('h\u00e4tte damit 3 Schichten direkt hintereinander ohne Pause');
          if (warnings.length) {
            showConfirm(emp.name+' '+warnings.join(' und ')+'. Trotzdem zuweisen?', applyAssignment, {confirmLabel:'Trotzdem zuweisen', danger:false});
            return;
          }
        }
      }
      applyAssignment();
    };
  });
}

restoreRememberedLogin();
render();
})();
</script>
